{% extends "base.html" %}
{% block content %}
  <div class="row justify-content-center">
    <div class="col-12 col-lg-8">
      <div class="card shadow-sm">
        <div class="card-body">
          <h3 class="mb-3">摆摊：上架商品</h3>
          <form method="post" novalidate>
            {% csrf_token %}
            {{ form.non_field_errors }}
            <div class="mb-3">
              <label class="form-label">商品标题</label>
              {{ form.title }}
              <div class="text-danger small">{{ form.title.errors }}</div>
            </div>
            <div class="mb-3">
              <label class="form-label">商品描述</label>
              {{ form.description }}
              <div class="text-danger small">{{ form.description.errors }}</div>
            </div>
            <div class="mb-3">
              <label class="form-label">售价（积分）</label>
              {{ form.price_points }}
              <div class="text-danger small">{{ form.price_points.errors }}</div>
            </div>
            <button class="btn btn-primary" type="submit">上架</button>
            <a class="btn btn-outline-secondary" href="{% url 'market_list' %}">返回</a>
          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
