{% extends "base.html" %}
{% block content %}
  <div class="row justify-content-center">
    <div class="col-12 col-md-6">
      <div class="card shadow-sm">
        <div class="card-body">
          <h3 class="mb-3">修改密码</h3>
          <form method="post" novalidate>
            {% csrf_token %}
            {{ form.non_field_errors }}
            <div class="mb-3">
              <label class="form-label">当前密码</label>
              {{ form.old_password }}
              <div class="text-danger small">{{ form.old_password.errors }}</div>
            </div>
            <div class="mb-3">
              <label class="form-label">新密码</label>
              {{ form.new_password1 }}
              <div class="text-danger small">{{ form.new_password1.errors }}</div>
            </div>
            <div class="mb-3">
              <label class="form-label">确认新密码</label>
              {{ form.new_password2 }}
              <div class="text-danger small">{{ form.new_password2.errors }}</div>
            </div>
            <button class="btn btn-primary" type="submit">确认修改</button>
            <a class="btn btn-outline-secondary" href="{% url 'home' %}">取消</a>
          </form>
        </div>
      </div>
    </div>
  </div>
{% endblock %}
